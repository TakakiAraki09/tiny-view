<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>tinyview</title>
<style>
:root{color-scheme:light dark}
html,body{margin:0;padding:0;background:Canvas;color:CanvasText}
body{font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,
  "Hiragino Sans","Noto Sans CJK JP","Yu Gothic UI",sans-serif;
  display:flex;justify-content:center}
main{box-sizing:border-box;width:100%;max-width:760px;padding:24px 20px}
main :first-child{margin-top:0}
main img,main svg,main video,main canvas{max-width:100%;height:auto}
main pre{overflow:auto}
</style>
<script>window.__TINYVIEW__ = /*__TINYVIEW__*/ null /*__TINYVIEW__*/;</script>
<script>
(function(){
  var d=window.__TINYVIEW__||{};
  if(d.title)document.title=d.title;
  var mount=function(){
    var m=document.createElement("main");
    m.innerHTML=(d.input==null)?"":String(d.input);
    document.body.appendChild(m);
  };
  if(document.body){mount()}else{document.addEventListener("DOMContentLoaded",mount,{once:true})}
})();
</script>
</head>
<body></body>
</html>
