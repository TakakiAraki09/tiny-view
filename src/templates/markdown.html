<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>tinyview</title>
<style>
:root{color-scheme:light dark}
html,body{margin:0;padding:0;background:Canvas;color:CanvasText}
body{font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,
  "Hiragino Sans","Noto Sans CJK JP","Yu Gothic UI",sans-serif;display:flex;justify-content:center}
main{box-sizing:border-box;width:100%;max-width:820px;padding:32px 24px}
main :first-child{margin-top:0}
main h1,main h2{padding-bottom:.3em;border-bottom:1px solid color-mix(in srgb,CanvasText 18%,transparent)}
main h1{font-size:2em}main h2{font-size:1.5em}
main code{font:13px/1.5 ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  padding:.2em .4em;border-radius:6px;background:color-mix(in srgb,CanvasText 8%,transparent)}
main pre{overflow:auto;border-radius:8px;background:color-mix(in srgb,CanvasText 6%,transparent)}
main pre code{padding:0;background:none;font-size:13px}
main blockquote{margin:0;padding:0 1em;color:color-mix(in srgb,CanvasText 60%,transparent);
  border-left:.25em solid color-mix(in srgb,CanvasText 18%,transparent)}
main table{border-collapse:collapse}main th,main td{padding:6px 13px;
  border:1px solid color-mix(in srgb,CanvasText 18%,transparent)}
main img,main svg,main video{max-width:100%;height:auto}
main hr{border:none;border-top:1px solid color-mix(in srgb,CanvasText 18%,transparent)}
/*__TINYVIEW_HLJS_CSS__*/
</style>
<script>window.__TINYVIEW__ = /*__TINYVIEW__*/ null /*__TINYVIEW__*/;</script>
<script>/*__TINYVIEW_MARKED__*/</script>
<script>/*__TINYVIEW_HLJS__*/</script>
<script>
(function(){
  var d=window.__TINYVIEW__||{};
  if(d.title)document.title=d.title;
  function run(){
    var src=(d.input==null)?"":String(d.input);
    var main=document.createElement("main");
    main.className="markdown-body";
    try{
      main.innerHTML=window.marked.parse(src);
    }catch(e){
      var pre=document.createElement("pre");pre.textContent=String(e);main.appendChild(pre);
    }
    if(window.hljs){
      var blocks=main.querySelectorAll("pre code");
      for(var i=0;i<blocks.length;i++){try{window.hljs.highlightElement(blocks[i]);}catch(e){}}
    }
    document.body.appendChild(main);
  }
  if(document.body){run()}else{document.addEventListener("DOMContentLoaded",run,{once:true})}
})();
</script>
</head>
<body></body>
</html>
