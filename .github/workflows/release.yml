name: Release

# Automated release via release-plz (https://release-plz.dev), with a MANUAL
# publish gate.
#
# Flow:
#   1. `release-pr` runs on every push to main and maintains a single "Release
#      PR" that bumps the version, updates the changelog, and (crucially) syncs
#      Cargo.lock — all derived from the conventional-commit history.
#   2. You merge that Release PR when ready. The bump lands on main but is NOT
#      yet published — merging alone never touches crates.io.
#   3. You publish deliberately by running this workflow from the Actions tab
#      (`workflow_dispatch`). `release` then publishes the merged-but-unpublished
#      version to crates.io and creates the git tag + GitHub Release.
#
# Why the split: the bump + Cargo.lock sync land in a reviewed PR (so the
# lockfile can never drift out from under `cargo publish` — the failure that
# motivated this rewrite), while the irreversible upload stays an explicit,
# human-triggered action rather than a side effect of merging.
on:
  # release-pr (push): keep the Release PR up to date automatically.
  push:
    branches:
      - main
  # release (manual): publish the merged version on demand.
  workflow_dispatch:

# release-plz is the ONLY automated publish path. A crates.io version is
# immutable, so never cancel an in-flight publish.
concurrency:
  group: release-plz
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Publishes the merged-but-unpublished version to crates.io. Manual only:
  # runs on workflow_dispatch, never on push, so merging a Release PR does not
  # publish by itself.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Manual publish gate + canonical-repo guard (a fork must not upload).
    if: github.event_name == 'workflow_dispatch' && github.repository == 'TakakiAraki09/tiny-view'
    permissions:
      contents: write
      # release-plz reads the merged Release PR to enrich the GitHub Release
      # (links/labels); matches the official quickstart.
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # release-plz drives git auth via the GITHUB_TOKEN env below; the
          # checkout-persisted credentials would otherwise conflict.
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # `release` runs `cargo publish`, which compiles + verifies the crate on
      # the runner. tinyview depends on wry (native WebView), so the same
      # system deps as the CI build jobs must be present or the verify build
      # fails. This step is the fix the bare release-plz template lacks.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens / updates the Release PR (version bump + changelog + Cargo.lock).
  # Runs on push to main only; the manual dispatch is for publishing, not for
  # refreshing the PR.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository == 'TakakiAraki09/tiny-view'
    permissions:
      contents: write
      pull-requests: write
    # Note: the workflow-level `concurrency: release-plz` already serializes
    # every run, so no job-level concurrency is needed here.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # release-plz's default semver check compiles the crate, so the wry
      # system deps are required here too.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
