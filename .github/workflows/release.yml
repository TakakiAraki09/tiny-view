name: Release

# Manual, one-click publish to crates.io. Trigger from the Actions tab (or
# `gh workflow run Release -f version=X.Y.Z`) and the workflow bumps the version,
# syncs the lockfile, publishes, and only then records the release commit + tag.
#
# Why dispatch instead of tag-push: a tag-push flow forces you to bump
# Cargo.toml / Cargo.lock and tag in lockstep by hand. Any drift (notably a
# stale Cargo.lock) makes `cargo publish` rewrite the lockfile on the runner,
# dirty the tree, and abort — after which the tag already points at the wrong
# commit and has to be force-moved. Doing the bump + lock sync + publish + tag
# inside one job removes that whole class of failure.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 1.0.5 (no leading v)"
        required: true
        type: string

# Never run two publishes concurrently; do NOT cancel an in-flight publish — an
# interrupted upload could leave a half-published version.
concurrency:
  group: release
  cancel-in-progress: false

# The job commits the bump and pushes the release tag back to the repo, so it
# needs write access to repository contents.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # Only the canonical repo publishes — a fork dispatching this must not
    # attempt an upload (it would fail on a missing token, but fail fast).
    if: github.repository == 'TakakiAraki09/tiny-view'
    steps:
      # Always release main's tip, regardless of which ref dispatched this run,
      # and check out a real `main` branch (not a detached/shallow HEAD) so the
      # release commit can be pushed back normally. fetch-depth: 0 avoids
      # shallow-push edge cases.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-publish

      # `cargo publish` compiles + verifies the package on the runner, so the
      # native-WebView (wry) Linux system deps must be present — same set as the
      # CI `test` / `release-build` jobs.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      # Reject malformed input before doing anything irreversible. Accept
      # X.Y.Z with an optional `-prerelease` suffix (e.g. 1.0.5, 2.0.0-rc.1).
      # Take the input via `env:` rather than interpolating ${{ }} into the
      # script body — avoids shell injection from the dispatch input.
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::version '${VERSION}' is not a valid semver (expected X.Y.Z[-prerelease])"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Guards against the two irreversible collisions, BEFORE the upload:
      # a crates.io version can never be re-published, and a moved release tag
      # is the exact footgun this workflow exists to avoid.
      - name: Guard against existing tag / published version
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::tag v${VERSION} already exists — pick an unused version"
            exit 1
          fi
          # crates.io returns 200 for an existing version, 404 otherwise. No
          # -f: we want the status code, not a non-zero exit, so 404 yields
          # CODE=404 and only a real 200 blocks. A network failure leaves CODE
          # empty (→ proceed); `cargo publish` is the final backstop against a
          # duplicate version.
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/tinyview/${VERSION}" || true)
          if [ "$CODE" = "200" ]; then
            echo "::error::tinyview ${VERSION} is already published on crates.io"
            exit 1
          fi

      # Set the package version to the requested value. `0,/.../` limits the
      # substitution to the FIRST `version = "..."` line — that is the
      # [package] version near the top of Cargo.toml; dependency versions use
      # the inline `{ version = ... }` form and never start a line.
      - name: Bump Cargo.toml version
        run: |
          set -euo pipefail
          sed -i -E "0,/^version = \".*\"/s//version = \"${VERSION}\"/" Cargo.toml
          # Sync Cargo.lock so the committed lockfile matches the new version —
          # this is precisely the drift that broke the previous tag-push flow.
          cargo update -p tinyview --precise "${VERSION}"

      # Belt-and-suspenders: confirm the manifest now actually carries the
      # requested version before the irreversible upload.
      - name: Verify bumped version
        run: |
          set -euo pipefail
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "input=${VERSION} cargo=${CARGO_VERSION}"
          if [ "${VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::bump failed: Cargo.toml is ${CARGO_VERSION}, expected ${VERSION}"
            exit 1
          fi

      # The irreversible step. `--locked` makes a lockfile mismatch a hard
      # error here instead of a silent rewrite-and-dirty later. Run it BEFORE
      # touching git so a failed publish leaves `main` clean — no orphan
      # release commit or tag for a version that never shipped.
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      # Publish succeeded → record the release. The crate is already immutable
      # on crates.io, so the tag (the version↔commit binding) is the
      # highest-priority record and is pushed FIRST. main is advanced after.
      # No --force anywhere: a failure here cannot corrupt history, and the
      # publish + tag already succeeded, so the warning tells the operator
      # exactly what manual step remains.
      - name: Commit bump, tag, and update main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${VERSION}"
          # Tag first — binds the published version to this commit even if the
          # main push below fails.
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          # Then fast-forward main to the release commit. If main advanced
          # during the run this is rejected (no --force); recover by applying
          # the bump commit to main by hand — the release itself is done.
          if ! git push origin HEAD:main; then
            echo "::error::published v${VERSION} and pushed tag v${VERSION}, but updating main failed (main likely advanced during the run). Apply the bump commit to main manually — do NOT re-run this workflow (the version is already published)."
            exit 1
          fi
