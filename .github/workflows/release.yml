name: Release

# Automated release via release-plz (https://release-plz.dev).
#
# Flow:
#   1. `release-pr` runs on every push to main and maintains a single "Release
#      PR" that bumps the version, updates the changelog, and (crucially) syncs
#      Cargo.lock — all derived from the conventional-commit history.
#   2. Merging that Release PR puts the bump on main, which triggers `release`
#      to publish the new version to crates.io and create the git tag + GitHub
#      Release.
#
# This replaces the previous hand-rolled flow. The whole point: the version
# bump and Cargo.lock sync land in the Release PR and are reviewed/merged like
# any change, so the lockfile can never drift out from under `cargo publish`
# (the failure that motivated this rewrite).
on:
  push:
    branches:
      - main

# release-plz is the ONLY automated publish path. A crates.io version is
# immutable, so never cancel an in-flight publish.
concurrency:
  group: release-plz
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Publishes to crates.io once a Release PR has been merged into main.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Only the canonical repo publishes — a fork must not attempt an upload.
    if: github.repository == 'TakakiAraki09/tiny-view'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # release-plz drives git auth via the GITHUB_TOKEN env below; the
          # checkout-persisted credentials would otherwise conflict.
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # `release` runs `cargo publish`, which compiles + verifies the crate on
      # the runner. tinyview depends on wry (native WebView), so the same
      # system deps as the CI build jobs must be present or the verify build
      # fails. This step is the fix the bare release-plz template lacks.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens / updates the Release PR (version bump + changelog + Cargo.lock).
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: github.repository == 'TakakiAraki09/tiny-view'
    permissions:
      contents: write
      pull-requests: write
    # Serialize PR updates so concurrent pushes don't race on the Release PR.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # release-plz's default semver check compiles the crate, so the wry
      # system deps are required here too.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
