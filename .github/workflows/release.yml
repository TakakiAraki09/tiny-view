name: Release

# Automated release via release-plz (https://release-plz.dev). Merging the
# Release PR publishes — there is no separate manual publish step.
#
# Flow (single job, runs on every push to main):
#   1. The default release-plz command runs `release-pr` then `release` in one
#      process. On a normal push, `release-pr` maintains a single "Release PR"
#      that bumps the version, updates the changelog, and (crucially) syncs
#      Cargo.lock — all derived from the conventional-commit history — while
#      `release` finds nothing new to publish (the bump isn't on main yet).
#   2. You merge that Release PR when ready. That push carries the bump onto
#      main, so the same job's `release` step detects the new version and
#      publishes it to crates.io, creating the git tag + GitHub Release.
#
# Why merge == publish: merging the Release PR is already a deliberate human
# action, so it serves as the gate for the irreversible crates.io upload — a
# separate manual `workflow_dispatch` step was redundant. The bump + Cargo.lock
# sync still land in a reviewed PR first, so the lockfile can never drift out
# from under `cargo publish` (the failure that motivated the release-plz setup).
#
# Single job (default command) on purpose: running `release-pr` and `release`
# as two jobs racing on the same push could open a spurious Release PR before
# the publish job tags the release. One process runs them in the correct order
# and shares one checkout + dependency install.
on:
  push:
    branches:
      - main

# release-plz is the ONLY automated publish path. A crates.io version is
# immutable, so never cancel an in-flight publish.
concurrency:
  group: release-plz
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Maintains the Release PR and publishes the merged bump, in that order, via
  # release-plz's default command (release-pr + release).
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    # Canonical-repo guard: a fork must never publish or open PRs upstream.
    if: github.repository == 'TakakiAraki09/tiny-view'
    permissions:
      contents: write
      # `release-pr` opens/updates the Release PR; `release` reads the merged PR
      # to enrich the GitHub Release (links/labels). Needs write either way.
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # release-plz drives git auth via the GITHUB_TOKEN env below; the
          # checkout-persisted credentials would otherwise conflict.
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # `release` runs `cargo publish` and `release-pr` runs a semver check —
      # both compile + verify the crate on the runner. tinyview depends on wry
      # (native WebView), so the same system deps as the CI build jobs must be
      # present or the build fails. This is the fix the bare template lacks.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      # No `command` input → release-plz runs the default: `release-pr` then
      # `release` sequentially in one process.
      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
