name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # Windows: detach mode (PRD §6.7 / detach.rs) now sets
          # DETACHED_PROCESS | CREATE_NEW_PROCESS_GROUP via creation_flags.
          # WebView2 runtime ships pre-installed on windows-latest runners, so
          # wry builds without extra system deps.
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2

      # wry 0.55 requires libwebkit2gtk-4.1 on Linux (Ubuntu 22.04+).
      # Source: https://github.com/tauri-apps/wry README + Tauri prerequisites.
      # libgtk-3-dev is for tao; libxdo / libayatana / librsvg / libssl are
      # Tauri prerequisite parity (transitively required by wry features).
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --verbose

      # `-D warnings` enforces zero-warning policy per CLAUDE.md "warning 0".
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # Lint + build the `e2e` self-test harness too (compile-only; the harness
      # itself runs in the dedicated `e2e` job which needs a display).
      - name: cargo clippy (e2e feature)
        run: cargo clippy --all-targets --features e2e -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # MSRV (Minimum Supported Rust Version) verification (issue #9).
  #
  # `Cargo.toml` declares `rust-version`; the `test` / `release-build` jobs only
  # exercise latest stable, so MSRV drift (a dependency quietly raising the
  # required Rust) stays invisible until a downstream pin on the MSRV breaks.
  # This job builds with exactly the declared MSRV toolchain so any future
  # dependency that needs a newer Rust fails CI here instead of in the wild.
  #
  # Keep the toolchain in sync with `rust-version` in Cargo.toml. Build-only
  # (no `cargo test`): the MSRV contract is "downstream can compile us", and
  # skipping tests keeps this cheap. ubuntu-latest only (cheapest runner).
  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to the MSRV declared in Cargo.toml (`rust-version`). Bumping the
      # MSRV means updating both this toolchain and Cargo.toml together.
      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      # Same Linux system deps as the `test` job: wry 0.55 needs
      # libwebkit2gtk-4.1 + GTK/soup/xdo/rsvg headers to build on Linux.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: cargo build (MSRV)
        run: cargo build --verbose

  # Live-WebView E2E self-test for the `--allow-*` permission flags (issue #5).
  # Drives a real WebView through the production build path and reads page-side
  # JS behavior back over a feature-gated IPC channel (src/e2e.rs).
  #
  # Marked best-effort (`continue-on-error`): headless GUI execution depends on
  # the runner environment (WKWebView session on macOS, xvfb + WebKitGTK on
  # Linux). The authoritative check is `TINYVIEW_E2E_SELFTEST=1 cargo run
  # --features e2e` on a local macOS machine. CI runs it so logs/regressions are
  # visible without blocking PRs on runner-specific GUI quirks.
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          key: e2e

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            xvfb

      - name: Build e2e harness
        run: cargo build --features e2e

      # Linux: wrap in a virtual X display. macOS: run directly.
      - name: Run E2E self-test (Linux / xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a env TINYVIEW_E2E_SELFTEST=1 cargo run --features e2e

      - name: Run E2E self-test (macOS)
        if: matrix.os == 'macos-latest'
        env:
          TINYVIEW_E2E_SELFTEST: "1"
        run: cargo run --features e2e

  release-build:
    name: release-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key from the `test` job so debug + release artifacts
          # don't clobber each other.
          key: release

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: cargo build --release
        run: cargo build --release --verbose

      # PRD §3: binary size budget is <10MB. We log size + a soft warning, but
      # don't fail the build — a real perf-budget guard belongs in a dedicated
      # job with proper baselines, not an ad-hoc CI check.
      - name: Report release binary size
        shell: bash
        run: |
          set -euo pipefail
          # Windows appends .exe; Unix targets produce a bare binary name.
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BIN="target/release/tinyview.exe"
          else
            BIN="target/release/tinyview"
          fi
          if [ ! -f "$BIN" ]; then
            echo "::error::release binary not found at $BIN"
            exit 1
          fi
          SIZE_BYTES=$(wc -c < "$BIN" | tr -d ' ')
          SIZE_MB=$(awk "BEGIN { printf \"%.2f\", $SIZE_BYTES / 1024 / 1024 }")
          echo "tinyview release binary: ${SIZE_BYTES} bytes (${SIZE_MB} MB)"
          echo "### tinyview release binary size (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- path: \`$BIN\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- size: ${SIZE_BYTES} bytes (${SIZE_MB} MB)" >> "$GITHUB_STEP_SUMMARY"
          echo "- PRD §3 budget: < 10 MB" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE_BYTES" -gt $((10 * 1024 * 1024)) ]; then
            echo "::warning::tinyview release binary exceeds PRD §3 budget (10 MB): ${SIZE_MB} MB"
          fi
